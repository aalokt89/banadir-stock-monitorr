name: Stock Checker

on:
  schedule:
    # Approximates "every 3 days" - see README for why this isn't exact.
    - cron: '0 13 1,4,7,10,13,16,19,22,25,28,31 * *'
  workflow_dispatch: {}  # lets you manually trigger a run from the Actions tab

jobs:
  check-stock:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install playwright

      - name: Install Playwright's Chromium browser
        run: python -m playwright install --with-deps chromium

      - name: Run stock check
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: python check_stock.py
