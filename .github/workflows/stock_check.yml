name: Stock Checker

on:
  schedule:
    # Runs at 13:00 UTC every 3rd day, starting from the 1st of the month.
    # GitHub cron doesn't support "every N days" directly, so this approximates
    # it by running on day-of-month 1, 4, 7, 10, ... See README for details
    # and an alternative if you want a true rolling 3-day interval.
    - cron: '0 13 1,4,7,10,13,16,19,22,25,28,31 * *'
  workflow_dispatch: {}  # lets you manually trigger a run from the Actions tab

jobs:
  check-stock:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run stock check
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
        run: python check_stock.py
